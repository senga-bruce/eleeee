<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@600&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- icon -->

    <link rel="icon" type="image/png" sizes="1080x180" href="images/logo.png" />
  </head>

  <!-- main body of the site  -->
  <body>
    <div class="login-all p-5">
      <div class="login-container p-5">
        <h2 class="display-4 text-bold text-center p-3">Login</h2>
        <form action="/login" method="POST">
          <div class="form-group">
            <label for="username" >Username :</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password :</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit">Login</button><br><br>
          <p>Don't have An Account yet? <a href="#" class="text-decoration-none">Sign Up</a></p>
        </form>
      </div>
    </div>
  </body>
</html>
